[tool.black]
line-length = 100
target-version = ["py312"]
exclude = """
/(
    \\.git
  | \\.venv
  | node_modules
  | \\.next
)/
"""

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["apps/backend", "apps/ml_api", "jobs", "libs/common", "tests"]
extend-exclude = ["notebooks"]
force-exclude = true

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
